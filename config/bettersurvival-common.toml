
#Weapon settings
[weapons]
	#Extra attack reach given to spears.
	#Range: 0.0 ~ 10.0
	spearReachBonus = 2.0
	#Base chance that a full-strength hammer attack stuns the target.
	#Range: 0.0 ~ 1.0
	stunBaseChance = 0.1
	#Increased stun chance per level of the Bash enchantment.
	#Range: 0.0 ~ 1.0
	bashModifier = 0.05
	#Base chance that a full-strength battle axe attack causes the target to drop their weapon.
	#Range: 0.0 ~ 1.0
	disarmBaseChance = 0.1
	#Disarm chance increase per level of the Disarming enchantment.
	#Range: 0.0 ~ 1.0
	disarmModifier = 0.05
	#Damage factor for battle axes (compared to a sword of the same material).
	#Range: 0.1 ~ 10.0
	battleAxeDmgMod = 1.6
	#Damage factor for nunchaku.
	#Range: 0.1 ~ 10.0
	nunchakuDmgMod = 0.5
	#Damage factor for hammers.
	#Range: 0.1 ~ 10.0
	hammerDmgMod = 1.2
	#Damage factor for daggers.
	#Range: 0.1 ~ 10.0
	daggerDmgMod = 0.7
	#Damage factor for spears.
	#Range: 0.1 ~ 10.0
	spearDmgMod = 0.75
	#Damage factor for crossbows.
	#Range: 0.1 ~ 10.0
	crossbowDmgMod = 2.0
	#Attack delay factor for battle axes.
	#Range: 0.1 ~ 10.0
	battleAxeSpd = 1.25
	#Attack delay factor for nunchaku.
	#Range: 0.1 ~ 10.0
	nunchakuSpd = 0.3
	#Attack delay factor for hammers.
	#Range: 0.1 ~ 10.0
	hammerSpd = 1.35
	#Attack delay factor for daggers.
	#Range: 0.1 ~ 10.0
	daggerSpd = 0.8
	#Attack delay factor for spears.
	#Range: 0.1 ~ 10.0
	spearSpd = 1.0
	#The time it takes to load the crossbow (in ticks).
	#Range: 1 ~ 200
	crossbowReloadTime = 40
	#When set to false, disables Vanilla shield recipe.
	allowVanillaShields = true

