	preventTunnelingBlockEntities = true

#Potion Coating settings
[potion_coating]
	#Base number of charges (hits) added when dipping a weapon in a cauldron.
	#Range: 1 ~ 1000
	potionHitsBase = 10
	#Maximum number of charges (hits) a weapon can stack.
	#Range: 1 ~ 1000
	potionHitsMax = 50
	#Divisor for potion duration on hit. Example: 8.0 means effect lasts 1/8 of the original potion time.
	#Range: 1.0 ~ 100.0
	potionDurationDivisor = 8.0
	#Modifier added to the potion's amplifier level. Use negative numbers to weaken the effect (e.g. -1 turns Poison II into Poison I).
	#Range: -10 ~ 10
	potionAmplifierModifier = 0
	#List of potion registry names that cannot be applied to weapons.
	potionBlacklist = ["minecraft:instant_health", "minecraft:healing"]

#Material settings
[materials]
	#Allows you to craft weapons from materials commonly present in mods.
	moddedMaterials = true

